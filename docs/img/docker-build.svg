<svg viewBox="0 0 700 240" xmlns="http://www.w3.org/2000/svg"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">

  <rect width="700" height="240" fill="white"/>

  <text x="350" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a2e">Docker Multi-Stage Build + Deployment</text>

  <defs>
    <marker id="adk" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#999"/>
    </marker>
  </defs>

  <!-- Stage 1: builder -->
  <rect x="10" y="40" width="220" height="130" rx="6" fill="#fafbfc" stroke="#e1e4e8" stroke-width="1.5"/>
  <rect x="10" y="40" width="220" height="28" rx="6" fill="#313244"/>
  <rect x="10" y="54" width="220" height="14" fill="#313244"/>
  <text x="120" y="58" text-anchor="middle" font-size="10" font-weight="700" fill="#cba6f7">Stage 1 — builder</text>

  <text x="26"  y="84"  font-size="10" font-weight="700" fill="#7c6af7">golang:1.25-alpine</text>
  <text x="26"  y="100" font-size="10" fill="#555">CGO_ENABLED=0</text>
  <text x="26"  y="114" font-size="10" fill="#555">GOOS=linux</text>
  <text x="26"  y="128" font-size="10" font-family="'Menlo','Consolas',monospace" fill="#333">go build -o elko</text>
  <text x="26"  y="144" font-size="9"  fill="#888">./cmd/elko</text>

  <rect x="26" y="154" width="190" height="8" rx="3" fill="#7c6af7" opacity="0.15"/>
  <rect x="26" y="154" width="160" height="8" rx="3" fill="#7c6af7" opacity="0.5"/>
  <text x="26" y="168" font-size="8" fill="#aaa">compiling…</text>

  <!-- Arrow -->
  <line x1="230" y1="105" x2="268" y2="105" stroke="#999" stroke-width="1.5" marker-end="url(#adk)"/>
  <text x="249" y="98" text-anchor="middle" font-size="8" fill="#aaa">COPY</text>
  <text x="249" y="118" text-anchor="middle" font-size="8" fill="#aaa">--from</text>

  <!-- Stage 2: runtime -->
  <rect x="270" y="40" width="220" height="130" rx="6" fill="#fafbfc" stroke="#e1e4e8" stroke-width="1.5"/>
  <rect x="270" y="40" width="220" height="28" rx="6" fill="#313244"/>
  <rect x="270" y="54" width="220" height="14" fill="#313244"/>
  <text x="380" y="58" text-anchor="middle" font-size="10" font-weight="700" fill="#cba6f7">Stage 2 — runtime</text>

  <text x="286" y="84"  font-size="10" font-weight="700" fill="#7c6af7">scratch</text>
  <text x="286" y="100" font-size="9"  fill="#555">+ CA certificates</text>
  <text x="286" y="114" font-size="9"  fill="#555">+ elko binary</text>
  <text x="286" y="130" font-size="9"  fill="#888">image ≈ 10 MB</text>
  <text x="286" y="144" font-size="9"  fill="#888">no shell · no OS</text>
  <text x="286" y="158" font-size="9"  fill="#888">minimal attack surface</text>

  <!-- Arrow -->
  <line x1="490" y1="105" x2="528" y2="105" stroke="#999" stroke-width="1.5" marker-end="url(#adk)"/>
  <text x="509" y="98" text-anchor="middle" font-size="8" fill="#aaa">docker run</text>
  <text x="509" y="118" text-anchor="middle" font-size="8" fill="#aaa">-p 8080:8080</text>

  <!-- Runtime box -->
  <rect x="530" y="40" width="162" height="130" rx="6" fill="#1e1e2e" stroke="#45475a" stroke-width="1.5"/>
  <text x="611" y="66"  text-anchor="middle" font-size="10" font-weight="700" fill="#cba6f7">Running Container</text>
  <line x1="538" y1="72" x2="684" y2="72" stroke="#45475a" stroke-width="1"/>
  <text x="611" y="88"  text-anchor="middle" font-size="10" fill="#a6adc8">elko serve</text>
  <text x="611" y="103" text-anchor="middle" font-size="10" fill="#a6adc8">--port 8080</text>
  <text x="611" y="120" text-anchor="middle" font-size="9"  fill="#6c7086">REST API</text>
  <text x="611" y="133" text-anchor="middle" font-size="9"  fill="#6c7086">Web Dashboard</text>
  <text x="611" y="152" text-anchor="middle" font-size="9"  fill="#7c6af7">localhost:8080</text>

  <!-- Volume note -->
  <rect x="270" y="182" width="220" height="36" rx="4" fill="#f0eeff" stroke="#7c6af7" stroke-width="1"/>
  <text x="380" y="198" text-anchor="middle" font-size="9"  font-weight="700" fill="#7c6af7">Optional: persistent SQLite cache</text>
  <text x="380" y="212" text-anchor="middle" font-size="9"  fill="#555">volumes: elko-data:/data  ·  --db /data/cache.db</text>

  <!-- ENV note -->
  <rect x="10" y="182" width="220" height="36" rx="4" fill="#fafbfc" stroke="#e1e4e8" stroke-width="1"/>
  <text x="120" y="198" text-anchor="middle" font-size="9"  font-weight="700" fill="#1a1a2e">Required environment</text>
  <text x="120" y="212" text-anchor="middle" font-size="9"  fill="#555" font-family="'Menlo','Consolas',monospace">SEC_USER_AGENT=App me@x.com</text>

</svg>
