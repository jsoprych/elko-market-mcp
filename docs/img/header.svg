<svg viewBox="0 0 760 155" xmlns="http://www.w3.org/2000/svg"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">

  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#181825"/>
      <stop offset="60%"  stop-color="#1e1e2e"/>
      <stop offset="100%" stop-color="#24243a"/>
    </linearGradient>
    <!-- Purple glow behind logo -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#7c6af7" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#7c6af7" stop-opacity="0"/>
    </radialGradient>
    <!-- Title gradient -->
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#cba6f7"/>
      <stop offset="100%" stop-color="#7c6af7"/>
    </linearGradient>

    <!-- Clip for logo face -->
    <clipPath id="h-ll">
      <circle cx="47" cy="82" r="13"/>
    </clipPath>
    <clipPath id="h-rl">
      <circle cx="79" cy="82" r="13"/>
    </clipPath>
    <radialGradient id="h-face" cx="38%" cy="32%" r="65%">
      <stop offset="0%"   stop-color="#FFD84A"/>
      <stop offset="100%" stop-color="#E8A000"/>
    </radialGradient>
  </defs>

  <!-- ── Background ──────────────────────────────────────────────── -->
  <rect width="760" height="155" fill="url(#bg)" rx="8"/>

  <!-- Subtle grid overlay -->
  <g stroke="#ffffff" stroke-width="0.3" opacity="0.04">
    <line x1="0" y1="31"  x2="760" y2="31"/>
    <line x1="0" y1="62"  x2="760" y2="62"/>
    <line x1="0" y1="93"  x2="760" y2="93"/>
    <line x1="0" y1="124" x2="760" y2="124"/>
    <line x1="152" y1="0" x2="152" y2="155"/>
    <line x1="304" y1="0" x2="304" y2="155"/>
    <line x1="456" y1="0" x2="456" y2="155"/>
    <line x1="608" y1="0" x2="608" y2="155"/>
  </g>

  <!-- Purple glow behind logo -->
  <ellipse cx="80" cy="77" rx="75" ry="72" fill="url(#glow)"/>

  <!-- ────────────────────────────────────────────────────────────── -->
  <!-- LOGO (scaled ~0.57x of 200x200 original, translate to x=17)   -->
  <!-- ────────────────────────────────────────────────────────────── -->
  <g transform="translate(17,12) scale(0.57)">

    <!-- Drop shadow -->
    <circle cx="103" cy="122" r="79" fill="rgba(0,0,0,0.22)"/>
    <!-- Face -->
    <circle cx="100" cy="118" r="79" fill="url(#h-face)" stroke="#C88000" stroke-width="1.5"/>
    <!-- Cheeks -->
    <ellipse cx="22"  cy="148" rx="17" ry="11" fill="#F08080" opacity="0.4"/>
    <ellipse cx="178" cy="148" rx="17" ry="11" fill="#F08080" opacity="0.4"/>
    <!-- Smile -->
    <path d="M70,158 Q100,183 130,158" fill="none" stroke="#8B6000" stroke-width="5" stroke-linecap="round"/>
    <!-- Temple bands -->
    <line x1="8"   y1="114" x2="35"  y2="117" stroke="#2a1800" stroke-width="4.5" stroke-linecap="round"/>
    <line x1="165" y1="117" x2="192" y2="114" stroke="#2a1800" stroke-width="4.5" stroke-linecap="round"/>
    <!-- Left frame -->
    <circle cx="63" cy="117" r="30" fill="#2a1800"/>
    <circle cx="63" cy="117" r="24" fill="#8B0D0D"/>
    <text x="63" y="125" text-anchor="middle" font-size="21" font-weight="900"
          fill="white" letter-spacing="-1" font-family="Arial Black,Arial,sans-serif">AI</text>
    <ellipse cx="54" cy="107" rx="7" ry="4" fill="white" opacity="0.16" transform="rotate(-30,54,107)"/>
    <!-- Right frame -->
    <circle cx="137" cy="117" r="30" fill="#2a1800"/>
    <circle cx="137" cy="117" r="24" fill="#f8f5e8"/>
    <g clip-path="url(#h-ll)"><!-- dummy clip, chart drawn manually within circle -->
    </g>
    <!-- Candlesticks (manually placed within right lens) -->
    <line x1="119" y1="107" x2="119" y2="130" stroke="#CC2222" stroke-width="1.3"/>
    <rect x="116" y="114" width="6" height="10" fill="#CC2222"/>
    <line x1="127" y1="109" x2="127" y2="126" stroke="#228833" stroke-width="1.3"/>
    <rect x="124" y="113" width="6" height="9"  fill="#228833"/>
    <line x1="135" y1="105" x2="135" y2="122" stroke="#228833" stroke-width="1.3"/>
    <rect x="132" y="107" width="6" height="10" fill="#228833"/>
    <line x1="143" y1="104" x2="143" y2="118" stroke="#CC2222" stroke-width="1.3"/>
    <rect x="140" y="106" width="6" height="8"  fill="#CC2222"/>
    <line x1="151" y1="99"  x2="151" y2="118" stroke="#228833" stroke-width="1.3"/>
    <rect x="148" y="101" width="6" height="12" fill="#228833"/>
    <!-- Clip candles to right lens circle -->
    <circle cx="137" cy="117" r="24" fill="none" stroke="#f8f5e8" stroke-width="0"/>
    <polyline points="117,128 127,120 135,115 143,110 151,104"
              fill="none" stroke="#7c6af7" stroke-width="1.8" opacity="0.8"
              stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Mask outer of right lens -->
    <path d="M0,0 h200 v200 h-200 z M137,93 a24,24 0 1,0 0.001,0 z"
          fill="#1e1e2e" fill-rule="evenodd" opacity="0"/>
    <ellipse cx="126" cy="107" rx="7" ry="4" fill="white" opacity="0.2" transform="rotate(-30,126,107)"/>
    <!-- Bridge -->
    <rect x="93" y="112" width="14" height="5" rx="2.5" fill="#3a2600"/>
    <!-- Eyebrows -->
    <path d="M38,92 Q63,84 88,90"    fill="none" stroke="#6B4400" stroke-width="4" stroke-linecap="round"/>
    <path d="M112,90 Q137,84 162,92" fill="none" stroke="#6B4400" stroke-width="4" stroke-linecap="round"/>
    <!-- Yin-yang -->
    <g transform="translate(100,35)">
      <circle r="19" fill="#f0f0ee" stroke="#444" stroke-width="1.2"/>
      <path d="M0,19 A19,19 0 0,1 0,-19 A9.5,9.5 0 0,1 0,0 A9.5,9.5 0 0,0 0,19 Z" fill="#1a1a2e"/>
      <circle cy="-9.5" r="4.5" fill="#f0f0ee"/>
      <circle cy="9.5"  r="4.5" fill="#1a1a2e"/>
    </g>

  </g><!-- end logo scale group -->

  <!-- ── Vertical separator ─────────────────────────────────────── -->
  <line x1="142" y1="18" x2="142" y2="137" stroke="#45475a" stroke-width="1" opacity="0.6"/>

  <!-- ── Title ──────────────────────────────────────────────────── -->
  <text x="158" y="66" font-size="50" font-weight="900" fill="url(#title-grad)"
        letter-spacing="-1">elko</text>
  <text x="302" y="62" font-size="22" font-weight="300" fill="#585b70"
        letter-spacing="0">-market-mcp</text>

  <!-- ── Tagline ────────────────────────────────────────────────── -->
  <text x="158" y="88" font-size="13" fill="#a6adc8">
    Free financial market data for
    <tspan font-weight="700" fill="#cba6f7">AI agents</tspan>
    ·
    <tspan font-weight="700" fill="#cba6f7">CLI</tspan>
    ·
    <tspan font-weight="700" fill="#cba6f7">REST clients</tspan>
  </text>

  <!-- ── Source pills ───────────────────────────────────────────── -->
  <!-- Yahoo Finance -->
  <rect x="158" y="100" width="92" height="18" rx="9" fill="#313244" stroke="#45475a" stroke-width="0.8"/>
  <text x="204" y="113" text-anchor="middle" font-size="9" fill="#cba6f7">Yahoo Finance</text>

  <!-- SEC EDGAR -->
  <rect x="256" y="100" width="72" height="18" rx="9" fill="#313244" stroke="#45475a" stroke-width="0.8"/>
  <text x="292" y="113" text-anchor="middle" font-size="9" fill="#cba6f7">SEC EDGAR</text>

  <!-- US Treasury -->
  <rect x="334" y="100" width="76" height="18" rx="9" fill="#313244" stroke="#45475a" stroke-width="0.8"/>
  <text x="372" y="113" text-anchor="middle" font-size="9" fill="#cba6f7">US Treasury</text>

  <!-- BLS -->
  <rect x="416" y="100" width="38" height="18" rx="9" fill="#313244" stroke="#45475a" stroke-width="0.8"/>
  <text x="435" y="113" text-anchor="middle" font-size="9" fill="#cba6f7">BLS</text>

  <!-- FDIC -->
  <rect x="460" y="100" width="38" height="18" rx="9" fill="#313244" stroke="#45475a" stroke-width="0.8"/>
  <text x="479" y="113" text-anchor="middle" font-size="9" fill="#cba6f7">FDIC</text>

  <!-- World Bank -->
  <rect x="504" y="100" width="70" height="18" rx="9" fill="#313244" stroke="#45475a" stroke-width="0.8"/>
  <text x="539" y="113" text-anchor="middle" font-size="9" fill="#cba6f7">World Bank</text>

  <!-- ── Right-side badges ──────────────────────────────────────── -->
  <!-- 10 tools -->
  <rect x="622" y="44" width="62" height="22" rx="4" fill="#7c6af7" opacity="0.18" stroke="#7c6af7" stroke-width="0.8"/>
  <text x="653" y="59" text-anchor="middle" font-size="10" font-weight="700" fill="#cba6f7">10 tools</text>

  <!-- Apache 2.0 -->
  <rect x="622" y="72" width="62" height="22" rx="4" fill="#313244" stroke="#45475a" stroke-width="0.8"/>
  <text x="653" y="87" text-anchor="middle" font-size="9" fill="#a6adc8">Apache 2.0</text>

  <!-- No keys -->
  <rect x="692" y="44" width="58" height="22" rx="4" fill="#228833" opacity="0.20" stroke="#228833" stroke-width="0.8"/>
  <text x="721" y="55" text-anchor="middle" font-size="8" fill="#a6e3a1">no API</text>
  <text x="721" y="65" text-anchor="middle" font-size="8" fill="#a6e3a1">keys</text>

  <!-- Go badge -->
  <rect x="692" y="72" width="58" height="22" rx="4" fill="#313244" stroke="#45475a" stroke-width="0.8"/>
  <text x="721" y="87" text-anchor="middle" font-size="9" fill="#89b4fa">Go 1.21+</text>

  <!-- ── Bottom strip ────────────────────────────────────────────── -->
  <rect x="8" y="138" width="744" height="11" rx="4" fill="#181825"/>
  <text x="380" y="147" text-anchor="middle" font-size="8" fill="#45475a" letter-spacing="3">
    ELKO.AI  ·  FREE  ·  OPEN SOURCE  ·  LOCAL  ·  NO TELEMETRY
  </text>

</svg>
