<svg viewBox="0 0 760 600" xmlns="http://www.w3.org/2000/svg"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">

  <rect width="760" height="600" fill="white"/>

  <text x="380" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a2e">End-to-End Data Flow  —  yahoo_history example</text>

  <defs>
    <marker id="arrd" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#999"/>
    </marker>
    <marker id="arrd-out" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7c6af7"/>
    </marker>
  </defs>

  <!-- ── USER INPUT ──────────────────────────────────────────────── -->
  <rect x="180" y="36" width="400" height="32" rx="16" fill="#7c6af7"/>
  <text x="380" y="57" text-anchor="middle" font-size="12" font-weight="700" fill="white">User  —  "Get AAPL 1-year daily history"</text>

  <!-- Fan-out to 3 interfaces -->
  <line x1="240" y1="68" x2="120" y2="100" stroke="#ccc" stroke-width="1.2"/>
  <line x1="380" y1="68" x2="380" y2="100" stroke="#ccc" stroke-width="1.2"/>
  <line x1="520" y1="68" x2="640" y2="100" stroke="#ccc" stroke-width="1.2"/>

  <!-- MCP box -->
  <rect x="30"  y="100" width="175" height="52" rx="5" fill="#1e1e2e" stroke="#45475a" stroke-width="1.5"/>
  <text x="117" y="120" text-anchor="middle" font-size="10" font-weight="700" fill="#cba6f7">MCP stdio</text>
  <text x="117" y="133" text-anchor="middle" font-size="8" fill="#a6adc8">tools/call</text>
  <text x="117" y="145" text-anchor="middle" font-size="8" fill="#6c7086" font-family="'Menlo','Consolas',monospace">yahoo_history {AAPL,1y}</text>

  <!-- REST box -->
  <rect x="293" y="100" width="175" height="52" rx="5" fill="#1e1e2e" stroke="#45475a" stroke-width="1.5"/>
  <text x="380" y="120" text-anchor="middle" font-size="10" font-weight="700" fill="#cba6f7">REST API</text>
  <text x="380" y="133" text-anchor="middle" font-size="8" fill="#a6adc8">POST /v1/call/yahoo_history</text>
  <text x="380" y="145" text-anchor="middle" font-size="8" fill="#6c7086" font-family="'Menlo','Consolas',monospace">{"symbol":"AAPL","period":"1y"}</text>

  <!-- CLI box -->
  <rect x="555" y="100" width="175" height="52" rx="5" fill="#1e1e2e" stroke="#45475a" stroke-width="1.5"/>
  <text x="642" y="120" text-anchor="middle" font-size="10" font-weight="700" fill="#cba6f7">CLI</text>
  <text x="642" y="133" text-anchor="middle" font-size="8" fill="#a6adc8">elko call yahoo_history</text>
  <text x="642" y="145" text-anchor="middle" font-size="8" fill="#6c7086" font-family="'Menlo','Consolas',monospace">symbol=AAPL period=1y</text>

  <!-- Fan-in arrows to Registry -->
  <line x1="117" y1="152" x2="280" y2="182" stroke="#ccc" stroke-width="1.2" marker-end="url(#arrd)"/>
  <line x1="380" y1="152" x2="380" y2="182" stroke="#ccc" stroke-width="1.2" marker-end="url(#arrd)"/>
  <line x1="642" y1="152" x2="480" y2="182" stroke="#ccc" stroke-width="1.2" marker-end="url(#arrd)"/>

  <!-- ── REGISTRY ────────────────────────────────────────────────── -->
  <rect x="180" y="182" width="400" height="36" rx="6" fill="#f0eeff" stroke="#7c6af7" stroke-width="1.5"/>
  <text x="380" y="201" text-anchor="middle" font-size="12" font-weight="700" fill="#7c6af7">registry.Call("yahoo_history", args)</text>
  <text x="380" y="213" text-anchor="middle" font-size="9" fill="#888">unified catalogue · thread-safe RWMutex</text>

  <line x1="380" y1="218" x2="380" y2="238" stroke="#999" stroke-width="1.5" marker-end="url(#arrd)"/>

  <!-- ── EXTRACTOR ──────────────────────────────────────────────── -->
  <rect x="180" y="238" width="400" height="52" rx="6" fill="#fafbfc" stroke="#e1e4e8" stroke-width="1.5"/>
  <text x="380" y="258" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1a2e">extractYahooOHLCV(ctx, args, ch)</text>
  <text x="380" y="272" text-anchor="middle" font-size="10" fill="#555">parse args  →  symbol=AAPL · period=1y · interval=1d</text>
  <text x="380" y="284" text-anchor="middle" font-size="9" fill="#888" font-family="'Menlo','Consolas',monospace">https://query1.finance.yahoo.com/v8/finance/chart/AAPL?range=1y&amp;interval=1d</text>

  <line x1="380" y1="290" x2="380" y2="310" stroke="#999" stroke-width="1.5" marker-end="url(#arrd)"/>

  <!-- ── FETCH ──────────────────────────────────────────────────── -->
  <rect x="180" y="310" width="400" height="44" rx="6" fill="#f0eeff" stroke="#7c6af7" stroke-width="1.5"/>
  <text x="380" y="331" text-anchor="middle" font-size="11" font-weight="700" fill="#7c6af7">ch.Fetch(ctx, url)  —  runner.makeFetch closure</text>
  <text x="380" y="346" text-anchor="middle" font-size="10" fill="#555">key = "yahoo:https://…"  ·  L1 miss  ·  L2 miss</text>

  <line x1="380" y1="354" x2="380" y2="374" stroke="#999" stroke-width="1.5" marker-end="url(#arrd)"/>

  <!-- ── HTTP ───────────────────────────────────────────────────── -->
  <rect x="180" y="374" width="400" height="44" rx="6" fill="#fafbfc" stroke="#e1e4e8" stroke-width="1.5"/>
  <text x="380" y="394" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1a2e">http.Client.Get(url)</text>
  <text x="380" y="409" text-anchor="middle" font-size="9" fill="#888" font-family="'Menlo','Consolas',monospace">User-Agent: Mozilla/5.0 (compatible; elko-market-mcp/1.0)</text>

  <line x1="380" y1="418" x2="380" y2="438" stroke="#999" stroke-width="1.5" marker-end="url(#arrd)"/>

  <!-- ── YAHOO API RESPONSE ─────────────────────────────────────── -->
  <rect x="180" y="438" width="400" height="36" rx="6" fill="#fafbfc" stroke="#e1e4e8" stroke-width="1.5"/>
  <text x="380" y="457" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1a2e">Yahoo Finance API  →  200 OK · JSON body</text>
  <text x="380" y="469" text-anchor="middle" font-size="9" fill="#888">cache.Set(key, body, TTL=1h)  →  write L1 + L2</text>

  <line x1="380" y1="474" x2="380" y2="494" stroke="#999" stroke-width="1.5" marker-end="url(#arrd)"/>

  <!-- ── PARSE + FORMAT ─────────────────────────────────────────── -->
  <rect x="180" y="494" width="400" height="44" rx="6" fill="#fafbfc" stroke="#e1e4e8" stroke-width="1.5"/>
  <text x="380" y="514" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1a2e">Unmarshal · filter NaN · zip OHLCV</text>
  <text x="380" y="528" text-anchor="middle" font-size="9" fill="#888" font-family="'Menlo','Consolas',monospace">CSV: Timestamp,Date,Open,High,Low,Close,AdjClose,Volume</text>

  <!-- Fan-out to 3 outputs -->
  <line x1="240" y1="538" x2="120" y2="558" stroke="#7c6af7" stroke-width="1.2"/>
  <line x1="380" y1="538" x2="380" y2="558" stroke="#7c6af7" stroke-width="1.2"/>
  <line x1="520" y1="538" x2="640" y2="558" stroke="#7c6af7" stroke-width="1.2"/>

  <!-- Output boxes -->
  <rect x="30"  y="558" width="175" height="32" rx="5" fill="#1e1e2e" stroke="#45475a" stroke-width="1"/>
  <text x="117" y="572" text-anchor="middle" font-size="9" fill="#cba6f7">MCP</text>
  <text x="117" y="583" text-anchor="middle" font-size="8" fill="#a6adc8" font-family="'Menlo','Consolas',monospace">content[0].text = csv</text>

  <rect x="293" y="558" width="175" height="32" rx="5" fill="#1e1e2e" stroke="#45475a" stroke-width="1"/>
  <text x="380" y="572" text-anchor="middle" font-size="9" fill="#cba6f7">REST</text>
  <text x="380" y="583" text-anchor="middle" font-size="8" fill="#a6adc8" font-family="'Menlo','Consolas',monospace">{"result": "…csv…"}</text>

  <rect x="555" y="558" width="175" height="32" rx="5" fill="#1e1e2e" stroke="#45475a" stroke-width="1"/>
  <text x="642" y="572" text-anchor="middle" font-size="9" fill="#cba6f7">CLI</text>
  <text x="642" y="583" text-anchor="middle" font-size="8" fill="#a6adc8" font-family="'Menlo','Consolas',monospace">print to stdout</text>

</svg>
