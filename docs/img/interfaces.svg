<svg viewBox="0 0 700 280" xmlns="http://www.w3.org/2000/svg"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">

  <rect width="700" height="280" fill="white"/>

  <text x="350" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a2e">Three Ways to Call Tools</text>

  <!-- ── MCP column ──────────────────────────────────────────────── -->
  <rect x="10" y="36" width="214" height="228" rx="6" fill="#fafbfc" stroke="#e1e4e8" stroke-width="1.5"/>
  <rect x="10" y="36" width="214" height="32" rx="6" fill="#1e1e2e"/>
  <rect x="10" y="54" width="214" height="14" fill="#1e1e2e"/>
  <text x="117" y="57" text-anchor="middle" font-size="12" font-weight="700" fill="#cba6f7">MCP  —  Ask Claude</text>

  <text x="26" y="86"  font-size="10" fill="#555">Just ask naturally:</text>
  <rect x="18" y="93" width="198" height="62" rx="4" fill="#f0eeff" stroke="#7c6af7" stroke-width="1"/>
  <text x="28" y="109" font-size="10" font-style="italic" fill="#555">"What's NVDA's price?"</text>
  <text x="28" y="123" font-size="10" font-style="italic" fill="#555">"Show AAPL income stmt"</text>
  <text x="28" y="137" font-size="10" font-style="italic" fill="#555">"Is the yield curve</text>
  <text x="28" y="149" font-size="10" font-style="italic" fill="#555"> inverted?"</text>

  <text x="26" y="173" font-size="9"  fill="#888">AI picks tool + args automatically.</text>
  <text x="26" y="186" font-size="9"  fill="#888">Works in Claude Code, Claude</text>
  <text x="26" y="199" font-size="9"  fill="#888">Desktop, Cursor, any MCP client.</text>

  <rect x="18" y="210" width="198" height="44" rx="4" fill="#1e1e2e"/>
  <text x="117" y="228" text-anchor="middle" font-size="9" fill="#a6adc8" font-family="'Menlo','Consolas',monospace">"type": "stdio"</text>
  <text x="117" y="242" text-anchor="middle" font-size="9" fill="#a6adc8" font-family="'Menlo','Consolas',monospace">"command": "/path/to/elko"</text>
  <text x="117" y="256" text-anchor="middle" font-size="9" fill="#a6adc8" font-family="'Menlo','Consolas',monospace">"args": ["mcp"]</text>

  <!-- ── CLI column ─────────────────────────────────────────────── -->
  <rect x="244" y="36" width="214" height="228" rx="6" fill="#fafbfc" stroke="#e1e4e8" stroke-width="1.5"/>
  <rect x="244" y="36" width="214" height="32" rx="6" fill="#1e1e2e"/>
  <rect x="244" y="54" width="214" height="14" fill="#1e1e2e"/>
  <text x="351" y="57" text-anchor="middle" font-size="12" font-weight="700" fill="#cba6f7">CLI  —  One-Shot</text>

  <text x="260" y="86"  font-size="10" fill="#555">Direct terminal invocation:</text>
  <rect x="252" y="93" width="198" height="96" rx="4" fill="#181825"/>
  <text x="262" y="109" font-size="9" fill="#a6adc8" font-family="'Menlo','Consolas',monospace">./elko call yahoo_quote \</text>
  <text x="262" y="122" font-size="9" fill="#a6adc8" font-family="'Menlo','Consolas',monospace">  symbol=NVDA</text>
  <text x="262" y="138" font-size="9" fill="#6c7086" font-family="'Menlo','Consolas',monospace">./elko call treasury_yields \</text>
  <text x="262" y="151" font-size="9" fill="#6c7086" font-family="'Menlo','Consolas',monospace">  latest=true</text>
  <text x="262" y="167" font-size="9" fill="#6c7086" font-family="'Menlo','Consolas',monospace">./elko call bls_series \</text>
  <text x="262" y="180" font-size="9" fill="#6c7086" font-family="'Menlo','Consolas',monospace">  series_id=LNS14000000</text>

  <text x="260" y="204" font-size="9"  fill="#888">Pipe to jq, csvkit, scripts.</text>
  <text x="260" y="217" font-size="9"  fill="#888">Great for automation and</text>
  <text x="260" y="230" font-size="9"  fill="#888">cron jobs.</text>
  <text x="260" y="254" font-size="9"  fill="#7c6af7">./elko catalogue  — list all tools</text>

  <!-- ── REST column ────────────────────────────────────────────── -->
  <rect x="478" y="36" width="214" height="228" rx="6" fill="#fafbfc" stroke="#e1e4e8" stroke-width="1.5"/>
  <rect x="478" y="36" width="214" height="32" rx="6" fill="#1e1e2e"/>
  <rect x="478" y="54" width="214" height="14" fill="#1e1e2e"/>
  <text x="585" y="57" text-anchor="middle" font-size="12" font-weight="700" fill="#cba6f7">REST  —  Web + API</text>

  <text x="494" y="86"  font-size="10" fill="#555">Start the server once:</text>
  <rect x="486" y="93" width="198" height="22" rx="3" fill="#181825"/>
  <text x="496" y="108" font-size="9" fill="#a6adc8" font-family="'Menlo','Consolas',monospace">./elko serve --port 8080</text>

  <text x="494" y="128" font-size="10" fill="#555">Then call from anywhere:</text>
  <rect x="486" y="135" width="198" height="56" rx="4" fill="#181825"/>
  <text x="496" y="150" font-size="8" fill="#a6adc8" font-family="'Menlo','Consolas',monospace">curl -XPOST localhost:8080/</text>
  <text x="496" y="163" font-size="8" fill="#a6adc8" font-family="'Menlo','Consolas',monospace">v1/call/yahoo_quote \</text>
  <text x="496" y="176" font-size="8" fill="#a6adc8" font-family="'Menlo','Consolas',monospace">-d '{"symbol":"AAPL"}'</text>
  <text x="496" y="189" font-size="8" fill="#6c7086" font-family="'Menlo','Consolas',monospace">→ {"result": "…"}</text>

  <text x="494" y="210" font-size="9" fill="#888">Browser UI at  /</text>
  <text x="494" y="224" font-size="9" fill="#888">Python / Node / any HTTP client.</text>
  <text x="494" y="237" font-size="9" fill="#888">Works from Docker, CI, notebooks.</text>
  <text x="494" y="254" font-size="9" fill="#7c6af7">localhost:8080  →  full dashboard</text>

</svg>
