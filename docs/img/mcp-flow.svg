<svg viewBox="0 0 700 200" xmlns="http://www.w3.org/2000/svg"
     font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">

  <rect width="700" height="200" fill="white"/>

  <text x="350" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a2e">MCP stdio Connection Flow</text>

  <defs>
    <marker id="am" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#999"/>
    </marker>
  </defs>

  <!-- User / prompt -->
  <rect x="10" y="56" width="120" height="88" rx="6" fill="#f0eeff" stroke="#7c6af7" stroke-width="1.5"/>
  <text x="70" y="82"  text-anchor="middle" font-size="11" font-weight="700" fill="#7c6af7">You</text>
  <text x="70" y="97"  text-anchor="middle" font-size="9"  fill="#555">"Is the yield</text>
  <text x="70" y="109" text-anchor="middle" font-size="9"  fill="#555">curve inverted</text>
  <text x="70" y="121" text-anchor="middle" font-size="9"  fill="#555">right now?"</text>
  <text x="70" y="136" text-anchor="middle" font-size="8"  fill="#aaa">natural language</text>

  <!-- Arrow -->
  <line x1="130" y1="100" x2="158" y2="100" stroke="#999" stroke-width="1.5" marker-end="url(#am)"/>

  <!-- AI Client -->
  <rect x="160" y="56" width="130" height="88" rx="6" fill="#1e1e2e" stroke="#45475a" stroke-width="1.5"/>
  <text x="225" y="82"  text-anchor="middle" font-size="11" font-weight="700" fill="#cba6f7">AI Client</text>
  <text x="225" y="97"  text-anchor="middle" font-size="9"  fill="#a6adc8">Claude Code</text>
  <text x="225" y="110" text-anchor="middle" font-size="9"  fill="#a6adc8">Claude Desktop</text>
  <text x="225" y="123" text-anchor="middle" font-size="9"  fill="#a6adc8">Cursor · agents</text>
  <text x="225" y="136" text-anchor="middle" font-size="8"  fill="#6c7086">picks tool + args</text>

  <!-- Arrow -->
  <line x1="290" y1="100" x2="318" y2="100" stroke="#999" stroke-width="1.5" marker-end="url(#am)"/>
  <text x="304" y="92" text-anchor="middle" font-size="8" fill="#aaa">stdio</text>
  <text x="304" y="113" text-anchor="middle" font-size="7" fill="#aaa" font-family="'Menlo','Consolas',monospace">JSON-RPC 2.0</text>

  <!-- elko binary -->
  <rect x="320" y="44" width="160" height="112" rx="6" fill="#f0eeff" stroke="#7c6af7" stroke-width="2"/>
  <text x="400" y="66"  text-anchor="middle" font-size="11" font-weight="700" fill="#7c6af7">elko binary</text>
  <line x1="328" y1="72" x2="472" y2="72" stroke="#d8d4ff" stroke-width="1"/>
  <text x="400" y="88"  text-anchor="middle" font-size="10" fill="#555">MCP server</text>
  <text x="400" y="102" text-anchor="middle" font-size="10" fill="#555">Registry (10 tools)</text>
  <text x="400" y="116" text-anchor="middle" font-size="10" fill="#555">Runner + Cache</text>
  <text x="400" y="130" text-anchor="middle" font-size="10" fill="#555">L1 memory · L2 SQLite</text>
  <text x="400" y="148" text-anchor="middle" font-size="8"  fill="#aaa">tools/list · tools/call · ping</text>

  <!-- Arrow -->
  <line x1="480" y1="100" x2="508" y2="100" stroke="#999" stroke-width="1.5" marker-end="url(#am)"/>
  <text x="494" y="92" text-anchor="middle" font-size="8" fill="#aaa">HTTPS</text>

  <!-- APIs -->
  <rect x="510" y="44" width="180" height="112" rx="6" fill="#fafbfc" stroke="#e1e4e8" stroke-width="1.5"/>
  <text x="600" y="66"  text-anchor="middle" font-size="11" font-weight="700" fill="#1a1a2e">Free Public APIs</text>
  <line x1="518" y1="72" x2="682" y2="72" stroke="#e8eaf0" stroke-width="1"/>
  <text x="600" y="88"  text-anchor="middle" font-size="9" fill="#7c6af7">Yahoo Finance</text>
  <text x="600" y="101" text-anchor="middle" font-size="9" fill="#7c6af7">SEC EDGAR</text>
  <text x="600" y="114" text-anchor="middle" font-size="9" fill="#7c6af7">US Treasury · BLS</text>
  <text x="600" y="127" text-anchor="middle" font-size="9" fill="#7c6af7">FDIC · World Bank</text>
  <text x="600" y="148" text-anchor="middle" font-size="8" fill="#aaa">no API keys required</text>

  <!-- Return arrow -->
  <line x1="510" y1="160" x2="160" y2="160" stroke="#7c6af7" stroke-width="1.2" marker-end="url(#am)"/>
  <text x="335" y="174" text-anchor="middle" font-size="9" fill="#7c6af7">formatted result → AI reasons over data → answers you</text>

</svg>
